# Reference: /etc/nginx/sites-available/docs.reguverse.com (hz-frontend 47.111.229.186)
# VitePress: /assets/ is content-hashed -> long cache. Root HTML + public/ logo -> no long immutable.

server {
    server_name docs.reguverse.com;
    root /var/www/docs-reguverse;
    index index.html;

    # VitePress hashed JS/CSS (and small hashed assets) only
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # All other pages + root-level logo/png/css: must not use immutable
    # (avoids "logo never updates" when filename is reused; HTML shell stays fresh)
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ $uri.html /404.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/docs.reguverse.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.reguverse.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = docs.reguverse.com) {
        return 301 https://$host$request_uri;
    }

    server_name docs.reguverse.com;
    listen 80;
    return 404;
}
