name: Deploy Knowledge to Test VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'scripts/**'
      - '*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  deploy-test:
    name: Sync to VPS-test and refresh index
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Pull latest on VPS-test
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_TEST_HOST }}
          username: ${{ secrets.VPS_TEST_USER }}
          key: ${{ secrets.VPS_TEST_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            cd /opt/docmcp-knowledge
            echo "=== Before: $(git rev-parse --short HEAD) ==="
            git config --global --add safe.directory /opt/docmcp-knowledge
            git fetch origin
            git checkout main
            git pull origin main --ff-only
            echo "=== After: $(git rev-parse --short HEAD) ==="

      - name: Refresh knowledge index on VPS-test
        run: |
          RESP=$(curl -sf -X POST "${{ secrets.VPS_TEST_BACKEND_URL }}/api/v1/knowledge/admin/reindex" \
            -H "Authorization: Bearer ${{ secrets.VPS_TEST_ADMIN_JWT }}" \
            -H "Content-Type: application/json" \
            --max-time 120 2>&1) || true
          echo "Response: $RESP"
          TOTAL=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('stats',{}).get('total_documents','?'))" 2>/dev/null || echo "unknown")
          echo "Total documents indexed: $TOTAL"
