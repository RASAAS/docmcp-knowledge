name: Deploy Knowledge Base

on:
  push:
    branches: [main]
    paths-ignore:
      - 'scripts/**'
      - '*.md'
      - '.github/**'

jobs:
  deploy:
    name: Sync to VPS and refresh index
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Pull latest knowledge data on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            cd /opt/docmcp-knowledge
            echo "=== Before: $(git rev-parse --short HEAD) ==="
            git fetch origin
            git checkout main
            git pull origin main --ff-only
            echo "=== After: $(git rev-parse --short HEAD) ==="

      - name: Refresh knowledge index
        run: |
          RESP=$(curl -sf -X POST "${{ secrets.VPS_BACKEND_URL }}/api/v1/knowledge/refresh" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_JWT_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 120 2>&1) || true
          echo "Response: $RESP"
          TOTAL=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['stats']['total_documents'])" 2>/dev/null || echo "unknown")
          echo "Total documents indexed: $TOTAL"
