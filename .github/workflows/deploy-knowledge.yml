name: Deploy Knowledge Base

on:
  push:
    branches: [main]
    paths-ignore:
      - 'scripts/**'
      - '*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  deploy-vps01:
    name: Sync to VPS-01 (Production)
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Pull latest on VPS-01
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            cd /opt/docmcp-knowledge
            echo "=== Before: $(git rev-parse --short HEAD) ==="
            git config --global --add safe.directory /opt/docmcp-knowledge
            git fetch origin
            git checkout main
            git pull origin main --ff-only
            echo "=== After: $(git rev-parse --short HEAD) ==="

      - name: Refresh knowledge index on VPS-01
        run: |
          RESP=$(curl -sf -X POST "${{ secrets.VPS_BACKEND_URL }}/api/v1/knowledge/admin/reindex" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_JWT_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 120 2>&1) || true
          echo "Response: $RESP"
          TOTAL=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('stats',{}).get('total_documents','?'))" 2>/dev/null || echo "unknown")
          echo "Total documents indexed: $TOTAL"

  deploy-vps-test:
    name: Sync to VPS-test
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && vars.DEPLOY_VPS_TEST == 'true'"

    steps:
      - name: Pull latest on VPS-test
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_TEST_HOST }}
          username: ${{ secrets.VPS_TEST_USER }}
          key: ${{ secrets.VPS_TEST_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            cd /opt/docmcp-knowledge
            echo "=== Before: $(git rev-parse --short HEAD) ==="
            git config --global --add safe.directory /opt/docmcp-knowledge
            git fetch origin
            git checkout main
            git pull origin main --ff-only
            echo "=== After: $(git rev-parse --short HEAD) ==="

      - name: Refresh knowledge index on VPS-test
        run: |
          RESP=$(curl -sf -X POST "${{ secrets.VPS_TEST_BACKEND_URL }}/api/v1/knowledge/admin/reindex" \
            -H "Authorization: Bearer ${{ secrets.VPS_TEST_ADMIN_JWT }}" \
            -H "Content-Type: application/json" \
            --max-time 120 2>&1) || true
          echo "Response: $RESP"
          TOTAL=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('stats',{}).get('total_documents','?'))" 2>/dev/null || echo "unknown")
          echo "Total documents indexed: $TOTAL"

  deploy-cn-ecs:
    name: Sync to CN ECS (SCP)
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload knowledge data to CN ECS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CN_BACKEND_HOST }}
          username: ${{ secrets.CN_BACKEND_USER }}
          key: ${{ secrets.CN_BACKEND_SSH_KEY }}
          port: 22
          source: "eu_mdr/,fda/,nmpa/,imdrf/,shared/"
          target: "/opt/docmcp-knowledge"
          overwrite: true
          rm: false

      - name: Reindex knowledge on CN ECS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.CN_BACKEND_HOST }}
          username: ${{ secrets.CN_BACKEND_USER }}
          key: ${{ secrets.CN_BACKEND_SSH_KEY }}
          port: 22
          command_timeout: 3m
          script: |
            cd /opt/docmcp
            docker compose exec -T llm-proxy python3 -c "
            import sys
            sys.path.insert(0, '/app/llm-proxy')
            from knowledge_routes import rebuild_knowledge_index
            idx = rebuild_knowledge_index()
            print(f'CN ECS reindex complete: {idx.stats.get(\"total_documents\", \"?\")} documents')
            "
