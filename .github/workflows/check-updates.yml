name: Weekly Regulatory Update Check

# Batched cron schedule to avoid rate limits:
#   Mon 02:00 UTC -> EU MDR (EUR-Lex API + Vertex AI Search)
#   Wed 02:00 UTC -> FDA (RSS + OpenFDA API + Vertex AI Search)
#   Fri 02:00 UTC -> NMPA/CMDE (Vertex AI Search primary)
#   1st of month 03:00 UTC -> ISO/IEC shared standards (Vertex AI Search)
# Vertex AI Search free tier: 10,000 queries/month. Google CSE kept as fallback.

on:
  schedule:
    - cron: '0 2 * * 1'   # Monday:    EU MDR
    - cron: '0 2 * * 3'   # Wednesday: FDA
    - cron: '0 2 * * 5'   # Friday:    NMPA
    - cron: '0 3 1 * *'   # 1st/month: Shared standards (ISO/IEC)
  workflow_dispatch:
    inputs:
      regulation_group:
        description: 'Regulation group to check (eu_mdr/fda/nmpa/shared/all)'
        required: false
        default: 'all'

jobs:
  check-updates:
    runs-on: ubuntu-latest
    name: Check for regulatory content updates
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine regulation group from schedule
        id: group
        run: |
          # Manual dispatch overrides schedule detection
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            GROUP="${{ github.event.inputs.regulation_group }}"
          else
            DAY=$(date +%u)   # 1=Mon, 3=Wed, 5=Fri
            DOM=$(date +%d)   # day of month
            if [ "$DOM" = "01" ]; then
              GROUP="shared"
            elif [ "$DAY" = "1" ]; then
              GROUP="eu_mdr"
            elif [ "$DAY" = "3" ]; then
              GROUP="fda"
            elif [ "$DAY" = "5" ]; then
              GROUP="nmpa"
            else
              GROUP="all"
            fi
          fi
          echo "group=$GROUP" >> $GITHUB_OUTPUT
          echo "Checking regulation group: $GROUP"

      - name: Run update check
        id: check
        run: |
          GROUP="${{ steps.group.outputs.group }}"
          if [ "$GROUP" = "all" ]; then
            python scripts/fetch_updates.py --check-all --analyze-versions --report --output /tmp/update_report.json
          else
            python scripts/fetch_updates.py --check "$GROUP" --analyze-versions --report --output /tmp/update_report.json
          fi
        env:
          VERTEX_AI_PROJECT_ID: ${{ secrets.VERTEX_AI_PROJECT_ID }}
          VERTEX_AI_SEARCH_APP_ID: ${{ secrets.VERTEX_AI_SEARCH_APP_ID }}
          VERTEX_AI_SEARCH_API_KEY: ${{ secrets.VERTEX_AI_SEARCH_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_SEARCH_ENGINE_ID }}
          FDA_API_KEY: ${{ secrets.FDA_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'deepseek-chat' }}
        continue-on-error: true

      - name: Commit updated state and version registry
        run: |
          git add scripts/.update_state.json scripts/version_registry.json || true
          git diff --staged --quiet || git commit -m "chore: update regulatory check state [skip ci]"
          git push || true
        continue-on-error: true

      - name: Read report
        id: report
        run: |
          if [ -f /tmp/update_report.json ]; then
            SUMMARY=$(python -c "import json; d=json.load(open('/tmp/update_report.json')); print(d['summary'])")
            COUNT=$(python -c "import json; d=json.load(open('/tmp/update_report.json')); print(d['updates_found'])")
            CONFIRMED=$(python -c "import json; d=json.load(open('/tmp/update_report.json')); print(d.get('confirmed_updates', 0))")
            DB_CONFIRMED=$(python -c "import json; d=json.load(open('/tmp/update_report.json')); print(d.get('db_confirmed_new', 0))")
            echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "confirmed=$CONFIRMED" >> $GITHUB_OUTPUT
            echo "db_confirmed=$DB_CONFIRMED" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
            echo "confirmed=0" >> $GITHUB_OUTPUT
            echo "db_confirmed=0" >> $GITHUB_OUTPUT
          fi

      - name: Generate content drafts and create PR
        if: steps.report.outputs.db_confirmed != '0' || steps.report.outputs.confirmed != '0'
        run: |
          python scripts/generate_content_pr.py --report /tmp/update_report.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}

      - name: Regenerate Markdown from JSON (single source of truth)
        if: steps.report.outputs.db_confirmed != '0' || steps.report.outputs.confirmed != '0'
        run: |
          echo "Regenerating Markdown from JSON data layer..."
          python scripts/json_to_markdown.py --section all
          git add docs/zh/ docs/en/ || true
          git diff --staged --quiet || git commit -m "chore: regenerate Markdown from JSON data [skip ci]"
          git push || true

      - name: Create tracking issue if DB-confirmed updates found
        if: steps.report.outputs.db_confirmed != '0' || steps.report.outputs.confirmed != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/update_report.json', 'utf8'));
            const updates = report.updates;
            const confirmed = updates.filter(u => u.confirmed_update);
            const dbConfirmed = updates.filter(u => u.db_confirmed);
            const checkers = report.checkers_used || {};
            const dbStats = report.db_stats || {};

            let body = `## Automated Regulatory Update Detection\n\n`;
            body += `**Detected at**: ${report.checked_at}\n`;
            body += `**DB-confirmed new**: ${report.db_confirmed_new || 0}\n`;
            body += `**LLM-confirmed updates**: ${report.confirmed_updates || 0}\n`;
            body += `**Noise filtered**: ${report.noise_filtered_total || 0}\n`;
            body += `**Checkers**: DB Comparator + `;
            body += checkers.google_cse ? 'Google CSE + ' : '';
            body += checkers.ecfr_api ? 'eCFR API + ' : '';
            body += checkers.eurlex_checker ? 'EUR-Lex + ' : '';
            body += checkers.openfda_api ? 'OpenFDA + ' : '';
            body += checkers.llm_analysis ? 'LLM' : '';
            body += `\n\n`;

            if (dbConfirmed.length > 0) {
              body += `## New Documents Found (not in database)\n\n`;
              for (const u of dbConfirmed) {
                body += `### ${u.category}\n`;
                if (u.new_items) {
                  for (const item of u.new_items.slice(0, 10)) {
                    body += `- **[${item.title}](${item.link})**\n`;
                    if (item.db_description) body += `  ${item.db_description}`;
                    if (item.pub_date) body += ` | Published: ${item.pub_date}`;
                    body += ` | Source: ${u.check_type}\n`;
                  }
                } else {
                  body += `- ${u.note}\n`;
                }
                body += `\n`;
              }
            }

            if (confirmed.length > 0) {
              body += `## LLM-Confirmed Version Updates (High Priority)\n\n`;
              for (const u of confirmed) {
                body += `### ${u.name}\n`;
                body += `- **Category**: \`${u.category}\`\n`;
                body += `- **New version**: ${u.new_version || 'unknown'}\n`;
                body += `- **URL**: ${u.new_url || u.url}\n`;
                body += `- **Confidence**: ${u.llm_analysis?.confidence ? (u.llm_analysis.confidence * 100).toFixed(0) + '%' : 'N/A'}\n`;
                body += `- **Reasoning**: ${u.llm_analysis?.reasoning || ''}\n\n`;
              }
            }

            const nonDbUpdates = updates.filter(u => !u.db_confirmed && !u.confirmed_update);
            if (nonDbUpdates.length > 0) {
              body += `## Other Detected Changes\n\n`;
              for (const u of nonDbUpdates) {
                body += `- **${u.name}** (\`${u.check_type}\`): ${u.note}\n`;
              }
              body += `\n`;
            }

            body += `## Database Comparison Summary\n\n`;
            body += `| Domain | DB Records | Status |\n`;
            body += `|--------|-----------|--------|\n`;
            for (const [domain, stats] of Object.entries(dbStats)) {
              const count = stats.count || 0;
              const extra = stats.latest_amendment ? ` (latest: ${stats.latest_amendment})` : '';
              body += `| ${domain} | ${count}${extra} | Active |\n`;
            }
            body += `\n---\n`;
            body += `*Only DB-confirmed new documents and LLM-confirmed updates trigger this issue.*\n`;
            body += `*Pure ETag/CDN noise is automatically filtered.*\n`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Auto] Regulatory updates detected - ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['update', 'automated']
            });
