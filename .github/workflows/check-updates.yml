name: Weekly Regulatory Update Check

# Batched cron schedule (Beijing Time 03:00 = UTC 19:00 previous day):
#   Mon 03:00 CST (Sun 19:00 UTC) -> EU MDR (EUR-Lex SPARQL API + EC Latest Updates)
#   Tue 03:00 CST (Mon 19:00 UTC) -> Tier 1: UK MHRA + Canada + Australia TGA
#   Wed 03:00 CST (Tue 19:00 UTC) -> FDA (RSS + eCFR API + OpenFDA API)
#   Thu 03:00 CST (Wed 19:00 UTC) -> Tier 1: Japan PMDA + Korea MFDS
#   Fri 03:00 CST (Thu 19:00 UTC) -> NMPA/CMDE (Vertex AI Search primary)
#   1st of month 03:00 CST (prev 19:00 UTC) -> ISO/IEC shared standards
# Scheduled during off-peak hours to minimize user impact from deploy restarts.

on:
  schedule:
    - cron: '0 19 * * 0'   # Sun 19:00 UTC = Mon 03:00 CST: EU MDR
    - cron: '0 19 * * 1'   # Mon 19:00 UTC = Tue 03:00 CST: UK + Canada + Australia
    - cron: '0 19 * * 2'   # Tue 19:00 UTC = Wed 03:00 CST: FDA
    - cron: '0 19 * * 3'   # Wed 19:00 UTC = Thu 03:00 CST: Japan + Korea
    - cron: '0 19 * * 4'   # Thu 19:00 UTC = Fri 03:00 CST: NMPA
    - cron: '0 19 1 * *'   # 1st 19:00 UTC = 2nd 03:00 CST: Shared standards (ISO/IEC)
  workflow_dispatch:
    inputs:
      regulation_group:
        description: 'Regulation group to check (eu_mdr/fda/nmpa/shared/uk_mhra/canada/australia_tga/japan_pmda/korea_mfds/tier1_west/tier1_east/all)'
        required: false
        default: 'all'

jobs:
  check-updates:
    runs-on: ubuntu-latest
    name: Check for regulatory content updates
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libreoffice-writer-nogui

      - name: Install Python dependencies
        run: pip install requests pyyaml python-docx beautifulsoup4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine regulation group from schedule
        id: group
        run: |
          # Manual dispatch overrides schedule detection
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            GROUP="${{ github.event.inputs.regulation_group }}"
          else
            DAY=$(date +%u)   # UTC day of week (1=Mon .. 7=Sun)
            DOM=$(date +%d)   # day of month
            if [ "$DOM" = "01" ]; then
              GROUP="shared"
            elif [ "$DAY" = "7" ]; then
              GROUP="eu_mdr"           # Sun UTC = Mon CST
            elif [ "$DAY" = "1" ]; then
              GROUP="tier1_west"       # Mon UTC = Tue CST: UK+CA+AU
            elif [ "$DAY" = "2" ]; then
              GROUP="fda"              # Tue UTC = Wed CST
            elif [ "$DAY" = "3" ]; then
              GROUP="tier1_east"       # Wed UTC = Thu CST: JP+KR
            elif [ "$DAY" = "4" ]; then
              GROUP="nmpa"             # Thu UTC = Fri CST
            else
              GROUP="all"
            fi
          fi
          echo "group=$GROUP" >> $GITHUB_OUTPUT
          echo "Checking regulation group: $GROUP"

      - name: Run update check
        id: check
        run: |
          GROUP="${{ steps.group.outputs.group }}"
          if [ "$GROUP" = "all" ]; then
            python scripts/fetch_updates.py --check-all --analyze-versions --report --output /tmp/update_report.json
          else
            python scripts/fetch_updates.py --check "$GROUP" --analyze-versions --report --output /tmp/update_report.json
          fi
        env:
          VERTEX_AI_PROJECT_ID: ${{ secrets.VERTEX_AI_PROJECT_ID }}
          VERTEX_AI_SEARCH_APP_ID: ${{ secrets.VERTEX_AI_SEARCH_APP_ID }}
          VERTEX_AI_SEARCH_API_KEY: ${{ secrets.VERTEX_AI_SEARCH_API_KEY }}
          FDA_API_KEY: ${{ secrets.FDA_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'deepseek-v4-pro' }}
        continue-on-error: true

      - name: Run precise standards version check (monthly)
        id: standards_check
        if: steps.group.outputs.group == 'shared' || steps.group.outputs.group == 'all'
        run: |
          python scripts/check_standards_versions.py --report /tmp/standards_version_report.json
        continue-on-error: true

      - name: Commit updated state and version registry
        run: |
          git add scripts/.update_state.json scripts/version_registry.json || true
          git diff --staged --quiet || git commit -m "chore: update regulatory check state [skip ci]"
          git push || true
        continue-on-error: true

      - name: Generate regulatory news from report
        id: news
        if: steps.check.outcome == 'success'
        run: |
          if [ ! -f /tmp/update_report.json ]; then
            echo "news_added=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Extract JSON portion (fetch_updates.py prints info lines before JSON)
          python3 -c "
          import json, sys
          with open('/tmp/update_report.json') as f:
              content = f.read()
          idx = content.index('{')
          report = json.loads(content[idx:])
          if report.get('updates_found', 0) == 0:
              sys.exit(0)
          with open('/tmp/update_report_clean.json', 'w') as f:
              json.dump(report, f, ensure_ascii=False)
          "
          if [ ! -f /tmp/update_report_clean.json ]; then
            echo "news_added=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Run report_to_news.py with LLM summaries
          python scripts/report_to_news.py \
            --report /tmp/update_report_clean.json \
            --use-llm 2>&1 | tee /tmp/news_generation.log
          # Count new items added
          ADDED=$(grep -c "^  + Added:" /tmp/news_generation.log || echo "0")
          echo "news_added=$ADDED" >> $GITHUB_OUTPUT
          echo "News items added: $ADDED"
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'deepseek-v4-pro' }}
        continue-on-error: true

      - name: Generate news pages for VitePress
        if: steps.news.outputs.news_added != '0' && steps.news.outputs.news_added != ''
        run: |
          python scripts/generate_news_pages.py
        continue-on-error: true

      - name: Commit and push regulatory news + pages
        if: steps.news.outputs.news_added != '0' && steps.news.outputs.news_added != ''
        run: |
          git add regulatory_news/ docs/en/news/ docs/zh/news/ || true
          git diff --staged --quiet || {
            git commit -m "chore: add regulatory news from automated detection"
            git push
          }
        continue-on-error: true

      - name: Read report
        id: report
        run: |
          if [ -f /tmp/update_report.json ]; then
            SUMMARY=$(python -c "import json; d=json.load(open('/tmp/update_report.json')); print(d['summary'])")
            COUNT=$(python -c "import json; d=json.load(open('/tmp/update_report.json')); print(d['updates_found'])")
            CONFIRMED=$(python -c "import json; d=json.load(open('/tmp/update_report.json')); print(d.get('confirmed_updates', 0))")
            DB_CONFIRMED=$(python -c "import json; d=json.load(open('/tmp/update_report.json')); print(d.get('db_confirmed_new', 0))")
            echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "confirmed=$CONFIRMED" >> $GITHUB_OUTPUT
            echo "db_confirmed=$DB_CONFIRMED" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
            echo "confirmed=0" >> $GITHUB_OUTPUT
            echo "db_confirmed=0" >> $GITHUB_OUTPUT
          fi
          # Read standards version check report
          if [ -f /tmp/standards_version_report.json ]; then
            STD_UPDATES=$(python -c "import json; d=json.load(open('/tmp/standards_version_report.json')); print(d['updates_detected'])")
            echo "std_updates=$STD_UPDATES" >> $GITHUB_OUTPUT
          else
            echo "std_updates=0" >> $GITHUB_OUTPUT
          fi

      - name: Generate content drafts and create PR
        if: steps.report.outputs.db_confirmed != '0' || steps.report.outputs.confirmed != '0'
        run: |
          python scripts/generate_content_pr.py --report /tmp/update_report.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}

      - name: Regenerate Markdown from JSON (single source of truth)
        if: steps.report.outputs.db_confirmed != '0' || steps.report.outputs.confirmed != '0'
        run: |
          echo "Regenerating Markdown from JSON data layer..."
          python scripts/json_to_markdown.py --section all
          git add docs/zh/ docs/en/ || true
          git diff --staged --quiet || git commit -m "chore: regenerate Markdown from JSON data [skip ci]"
          git push || true

      - name: Regenerate standards display pages
        if: steps.report.outputs.db_confirmed != '0' || steps.report.outputs.confirmed != '0'
        run: |
          echo "Regenerating standards pages from category JSON..."
          python scripts/generate_standards_pages.py
          git add docs/en/eu_mdr/ docs/zh/eu_mdr/ eu_mdr/standards/_index.json eu_mdr/other_standards/_index.json || true
          git diff --staged --quiet || git commit -m "chore: regenerate standards display pages [skip ci]"
          git push || true

      - name: Notify VPS backend to refresh knowledge index
        if: steps.report.outputs.db_confirmed != '0' || steps.report.outputs.confirmed != '0'
        run: |
          echo "Triggering knowledge base hot-refresh on US VPS..."
          RESP=$(curl -sf -X POST "$VPS_URL/api/v1/knowledge/refresh" \
            -H "Authorization: Bearer $ADMIN_JWT" \
            -H "Content-Type: application/json" \
            --max-time 120 2>&1) || true
          echo "US VPS Response: $RESP"
        env:
          VPS_URL: ${{ secrets.VPS_BACKEND_URL }}
          ADMIN_JWT: ${{ secrets.ADMIN_JWT_TOKEN }}
        continue-on-error: true

      - name: Reindex knowledge on CN ECS via SSH
        if: steps.report.outputs.db_confirmed != '0' || steps.report.outputs.confirmed != '0'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.CN_BACKEND_HOST }}
          username: ${{ secrets.CN_BACKEND_USER }}
          key: ${{ secrets.CN_BACKEND_SSH_KEY }}
          port: 22
          command_timeout: 3m
          script: |
            cd /opt/docmcp
            docker compose exec -T llm-proxy python3 -c "
            import sys
            sys.path.insert(0, '/app/llm-proxy')
            from knowledge_routes import rebuild_knowledge_index
            idx = rebuild_knowledge_index()
            print(f'CN ECS reindex: {idx.stats.get(\"total_documents\", \"?\")} documents')
            "
        continue-on-error: true

      - name: Create tracking issue if DB-confirmed updates found
        if: steps.report.outputs.db_confirmed != '0' || steps.report.outputs.confirmed != '0' || steps.report.outputs.std_updates != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = `## Automated Regulatory Update Detection\n\n`;

            // Standards version check results (precise direct-source monitoring)
            if (fs.existsSync('/tmp/standards_version_report.json')) {
              const stdReport = JSON.parse(fs.readFileSync('/tmp/standards_version_report.json', 'utf8'));
              if (stdReport.updates_detected > 0) {
                body += `## Standards Version Updates (Direct Source Check)\n\n`;
                body += `**Checked**: ${stdReport.total_checked} standards | **Updates found**: ${stdReport.updates_detected}\n\n`;
                for (const u of stdReport.updates) {
                  body += `- **${u.number}** (\`${u.category}\`): ${u.signal}\n`;
                  if (u.new_url) body += `  - New URL: ${u.new_url}\n`;
                }
                body += `\n`;
              }
            }

            // Existing detection report
            if (!fs.existsSync('/tmp/update_report.json')) {
              body += `*No regulatory update report generated.*\n`;
            } else {
            const report = JSON.parse(fs.readFileSync('/tmp/update_report.json', 'utf8'));
            const updates = report.updates;
            const confirmed = updates.filter(u => u.confirmed_update);
            const dbConfirmed = updates.filter(u => u.db_confirmed);
            const checkers = report.checkers_used || {};
            const dbStats = report.db_stats || {};

            body += `## Regulatory Document Updates (Vertex AI / CSE)\n\n`;
            body += `**Detected at**: ${report.checked_at}\n`;
            body += `**DB-confirmed new**: ${report.db_confirmed_new || 0}\n`;
            body += `**LLM-confirmed updates**: ${report.confirmed_updates || 0}\n`;
            body += `**Noise filtered**: ${report.noise_filtered_total || 0}\n`;
            body += `**Checkers**: DB Comparator + `;
            body += checkers.google_cse ? 'Google CSE + ' : '';
            body += checkers.ecfr_api ? 'eCFR API + ' : '';
            body += checkers.eurlex_checker ? 'EUR-Lex + ' : '';
            body += checkers.openfda_api ? 'OpenFDA + ' : '';
            body += checkers.llm_analysis ? 'LLM' : '';
            body += `\n\n`;

            if (dbConfirmed.length > 0) {
              body += `## New Documents Found (not in database)\n\n`;
              for (const u of dbConfirmed) {
                body += `### ${u.category}\n`;
                if (u.new_items) {
                  for (const item of u.new_items.slice(0, 10)) {
                    body += `- **[${item.title}](${item.link})**\n`;
                    if (item.db_description) body += `  ${item.db_description}`;
                    if (item.pub_date) body += ` | Published: ${item.pub_date}`;
                    body += ` | Source: ${u.check_type}\n`;
                  }
                } else {
                  body += `- ${u.note}\n`;
                }
                body += `\n`;
              }
            }

            if (confirmed.length > 0) {
              body += `## LLM-Confirmed Version Updates (High Priority)\n\n`;
              for (const u of confirmed) {
                body += `### ${u.name}\n`;
                body += `- **Category**: \`${u.category}\`\n`;
                body += `- **New version**: ${u.new_version || 'unknown'}\n`;
                body += `- **URL**: ${u.new_url || u.url}\n`;
                body += `- **Confidence**: ${u.llm_analysis?.confidence ? (u.llm_analysis.confidence * 100).toFixed(0) + '%' : 'N/A'}\n`;
                body += `- **Reasoning**: ${u.llm_analysis?.reasoning || ''}\n\n`;
              }
            }

            const nonDbUpdates = updates.filter(u => !u.db_confirmed && !u.confirmed_update);
            if (nonDbUpdates.length > 0) {
              body += `## Other Detected Changes\n\n`;
              for (const u of nonDbUpdates) {
                body += `- **${u.name}** (\`${u.check_type}\`): ${u.note}\n`;
              }
              body += `\n`;
            }

            body += `## Database Comparison Summary\n\n`;
            body += `| Domain | DB Records | Status |\n`;
            body += `|--------|-----------|--------|\n`;
            for (const [domain, stats] of Object.entries(dbStats)) {
              const count = stats.count || 0;
              const extra = stats.latest_amendment ? ` (latest: ${stats.latest_amendment})` : '';
              body += `| ${domain} | ${count}${extra} | Active |\n`;
            }
            body += `\n---\n`;
            body += `*Only DB-confirmed new documents and LLM-confirmed updates trigger this issue.*\n`;
            body += `*Pure ETag/CDN noise is automatically filtered.*\n`;
            } // end of existing report block

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Auto] Regulatory updates detected - ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['update', 'automated']
            });
