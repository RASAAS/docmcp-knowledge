name: Deploy Knowledge to Production VPS

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirm VPS-test has been verified (type "yes")'
        required: true
        type: string

jobs:
  validate:
    name: Pre-deploy Validation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "yes" ]; then
            echo "ERROR: You must type 'yes' to confirm VPS-test has been verified"
            exit 1
          fi

  deploy-prod:
    name: Sync to VPS-01 and refresh index
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Pull latest on VPS-01
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            cd /opt/docmcp-knowledge
            echo "=== Before: $(git rev-parse --short HEAD) ==="
            git config --global --add safe.directory /opt/docmcp-knowledge
            git fetch origin
            git checkout main
            git pull origin main --ff-only
            echo "=== After: $(git rev-parse --short HEAD) ==="

      - name: Refresh knowledge index on VPS-01
        run: |
          RESP=$(curl -sf -X POST "${{ secrets.VPS_BACKEND_URL }}/api/v1/knowledge/admin/reindex" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_JWT_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 120 2>&1) || true
          echo "Response: $RESP"
          TOTAL=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('stats',{}).get('total_documents','?'))" 2>/dev/null || echo "unknown")
          echo "Total documents indexed: $TOTAL"
